    <script>
        (function () {
            // 文章列表不做分流
            var ROOT_LABEL = '绿群教程';
            var SVG_NS = 'http://www.w3.org/2000/svg';

            var state = {
                allDocs: [],
                docByPath: new Map(),
                tree: null,
                currentPath: '',
                docLayoutByPath: new Map(),
                groupLayoutByPath: new Map(),
                activeGroupPath: '',
                loadError: ''
            };

            function normalizePath(value) {
                return String(value || '')
                    .replace(/\\/g, '/')
                    .replace(/^\/+|\/+$/g, '');
            }

            function splitFolderPath(path) {
                var normalized = normalizePath(path);
                return normalized ? normalized.split('/').filter(Boolean) : [];
            }

            function getFolderPathFromURL() {
                var params = new URLSearchParams(window.location.search);
                return normalizePath(params.get('path') || '');
            }

            function setMetaContent(selector, content) {
                var el = document.querySelector(selector);
                if (el && content) el.setAttribute('content', content);
            }

            function setCanonical(href) {
                var link = document.querySelector('link[rel="canonical"]');
                if (!link) {
                    link = document.createElement('link');
                    link.setAttribute('rel', 'canonical');
                    document.head.appendChild(link);
                }
                link.setAttribute('href', href);
            }

            function updateSeo(folderPath) {
                var baseUrl = 'https://dpapyru.github.io/site/pages/folder.html';
                var displayPath = folderPath || ROOT_LABEL;
                var canonical = folderPath ? (baseUrl + '?path=' + encodeURIComponent(folderPath)) : baseUrl;
                var title = displayPath + ' - 目录可视化 - 泰拉瑞亚Mod制作教程';
                var description = '泰拉瑞亚Mod制作教程目录视图：浏览“' + displayPath + '”的子目录与文章关系。';

                document.title = title;
                setCanonical(canonical);
                setMetaContent('meta[name="description"]', description);
                setMetaContent('meta[property="og:title"]', title);
                setMetaContent('meta[property="og:description"]', description);
                setMetaContent('meta[property="og:url"]', canonical);
                setMetaContent('meta[name="twitter:title"]', title);
                setMetaContent('meta[name="twitter:description"]', description);
            }

            function createFolderNode(name, path, parent) {
                return {
                    name: name,
                    path: path,
                    parent: parent,
                    children: new Map(),
                    docs: []
                };
            }

            function normalizeDoc(raw) {
                var path = normalizePath(raw && raw.path ? raw.path : raw && raw.filename ? raw.filename : '');
                if (!path || !/\.md$/i.test(path)) return null;

                return {
                    filename: raw.filename || path.split('/').pop() || '',
                    path: path,
                    title: raw.title || path.split('/').pop().replace(/\.md$/i, ''),
                    author: raw.author || '未知',
                    category: raw.category || '未分类',
                    order: Number(raw.order || 999) || 999,
                    prev_chapter: raw.prev_chapter || '',
                    next_chapter: raw.next_chapter || ''
                };
            }

            function compareFolder(a, b) {
                return String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN');
            }

            function compareDoc(a, b) {
                var orderDelta = (a.order || 999) - (b.order || 999);
                if (orderDelta !== 0) return orderDelta;
                return String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN');
            }

            function buildTree(docs) {
                var root = createFolderNode(ROOT_LABEL, '', null);

                docs.forEach(function (doc) {
                    var parts = splitFolderPath(doc.path);
                    var fileName = parts.pop();
                    if (!fileName) return;

                    var current = root;
                    var currentPath = '';

                    parts.forEach(function (part) {
                        currentPath = currentPath ? currentPath + '/' + part : part;
                        if (!current.children.has(part)) {
                            current.children.set(part, createFolderNode(part, currentPath, current));
                        }
                        current = current.children.get(part);
                    });

                    current.docs.push(doc);
                });

                return root;
            }

            function getFolderNode(path) {
                var normalized = normalizePath(path);
                if (!normalized) return state.tree;

                var parts = splitFolderPath(normalized);
                var current = state.tree;
                var i;
                for (i = 0; i < parts.length; i += 1) {
                    if (!current || !current.children.has(parts[i])) return null;
                    current = current.children.get(parts[i]);
                }
                return current;
            }

            function getParentPath(path) {
                var parts = splitFolderPath(path);
                parts.pop();
                return parts.join('/');
            }

            function getCssVar(name, fallback) {
                var value = getComputedStyle(document.documentElement).getPropertyValue(name);
                value = String(value || '').trim();
                return value || fallback;
            }

            function getPalette() {
                return {
                    bg: getCssVar('--bg-color', '#121212'),
                    surface: getCssVar('--bg-secondary', '#1c1f26'),
                    text: getCssVar('--text-color', '#f0f0f0'),
                    muted: getCssVar('--text-secondary', '#9aa4b2'),
                    border: getCssVar('--border-color', '#2f3b4f'),
                    primary: getCssVar('--primary-color', '#3fb950'),
                    folder: getCssVar('--link-color', '#4dabf7'),
                    doc: getCssVar('--text-color', '#f0f0f0'),
                    prev: '#4dabf7',
                    next: '#ff922b',
                    line: getCssVar('--border-color', '#3a4557')
                };
            }

            function createSvgEl(tag, attrs) {
                var el = document.createElementNS(SVG_NS, tag);
                Object.keys(attrs || {}).forEach(function (key) {
                    el.setAttribute(key, attrs[key]);
                });
                return el;
            }

            function polylinePath(points) {
                return points.map(function (point, index) {
                    return (index === 0 ? 'M ' : 'L ') + point.x + ' ' + point.y;
                }).join(' ');
            }

            function clamp(value, min, max) {
                return Math.max(min, Math.min(max, value));
            }

            function truncateText(text, maxLen) {
                var value = String(text || '');
                if (value.length <= maxLen) return value;
                return value.slice(0, Math.max(1, maxLen - 1)) + '…';
            }

            function wrapTextLines(text, maxCharsPerLine, maxLines) {
                var value = String(text || '').replace(/\s+/g, ' ').trim();
                var chars = Array.from(value);
                var lineLimit = Math.max(1, maxLines || 1);
                var lineChars = Math.max(1, maxCharsPerLine || 10);
                var lines = [];
                var i;

                if (!chars.length) return [''];

                for (i = 0; i < lineLimit && chars.length > 0; i += 1) {
                    lines.push(chars.splice(0, lineChars).join(''));
                }

                if (chars.length > 0) {
                    lines[lineLimit - 1] = truncateText(lines[lineLimit - 1] + chars.join(''), lineChars);
                }
                return lines;
            }

            function addInteractiveNode(group, onClick) {
                group.classList.add('map-clickable');
                group.setAttribute('tabindex', '0');
                group.setAttribute('role', 'button');
                group.addEventListener('click', onClick);
                group.addEventListener('keydown', function (event) {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        onClick();
                    }
                });
            }

            function drawNode(layer, options) {
                var x = options.cx - options.width / 2;
                var y = options.cy - options.height / 2;
                var accessibleLabel = String(options.label || options.title || options.subtitle || options.tooltip || '').trim();
                var titleLines = Array.isArray(options.titleLines) && options.titleLines.length > 0
                    ? options.titleLines
                    : [truncateText(options.title || '', options.titleMax || 14)];
                var titleSize = options.titleSize || 16;
                var titleLineHeight = options.titleLineHeight || Math.round(titleSize * 1.24);
                var hasSubtitle = !!options.subtitle;
                var titleStartY = options.cy - ((titleLines.length - 1) * titleLineHeight) / 2 - (hasSubtitle ? 9 : 0);

                var group = createSvgEl('g', {
                    'aria-label': accessibleLabel
                });
                layer.appendChild(group);

                var rect = createSvgEl('rect', {
                    x: String(x),
                    y: String(y),
                    width: String(options.width),
                    height: String(options.height),
                    rx: String(options.radius || 10),
                    ry: String(options.radius || 10),
                    fill: options.fill,
                    stroke: options.stroke,
                    'stroke-width': String(options.strokeWidth || 2)
                });
                group.appendChild(rect);

                titleLines.forEach(function (lineText, lineIndex) {
                    var title = createSvgEl('text', {
                        x: String(options.cx),
                        y: String(titleStartY + lineIndex * titleLineHeight),
                        'text-anchor': 'middle',
                        'font-size': String(titleSize),
                        'font-weight': String(options.titleWeight || 700),
                        fill: options.textColor
                    });
                    title.textContent = lineText;
                    group.appendChild(title);
                });

                if (hasSubtitle) {
                    var subtitle = createSvgEl('text', {
                        x: String(options.cx),
                        y: String(titleStartY + titleLines.length * titleLineHeight + 9),
                        'text-anchor': 'middle',
                        'font-size': String(options.subtitleSize || 12),
                        fill: options.subTextColor || options.textColor,
                        opacity: '0.92'
                    });
                    subtitle.textContent = truncateText(options.subtitle, options.subtitleMax || 20);
                    group.appendChild(subtitle);
                }

                if (options.tooltip) {
                    var tip = createSvgEl('title', {});
                    tip.textContent = options.tooltip;
                    group.appendChild(tip);
                }

                if (typeof options.onClick === 'function') {
                    addInteractiveNode(group, options.onClick);
                }

                return group;
            }

            function appendText(layer, options) {
                var text = createSvgEl('text', {
                    x: String(options.x),
                    y: String(options.y),
                    fill: options.fill,
                    'font-size': String(options.size || 14),
                    'font-weight': String(options.weight || 400),
                    'text-anchor': options.anchor || 'start'
                });
                if (options.opacity != null) {
                    text.setAttribute('opacity', String(options.opacity));
                }
                text.textContent = options.text || '';
                layer.appendChild(text);
                return text;
            }

            function drawChip(layer, options) {
                return drawNode(layer, {
                    cx: options.x + options.width / 2,
                    cy: options.y + options.height / 2,
                    width: options.width,
                    height: options.height,
                    radius: options.radius || Math.round(options.height / 2),
                    fill: options.fill,
                    stroke: options.stroke,
                    strokeWidth: options.strokeWidth || 1.8,
                    textColor: options.textColor,
                    title: options.label,
                    titleMax: options.titleMax || 24,
                    titleSize: options.titleSize || 13,
                    titleWeight: options.titleWeight || 700,
                    tooltip: options.tooltip,
                    onClick: options.onClick || null
                });
            }

            function collectDocsRecursively(folderNode) {
                var docs = Array.isArray(folderNode && folderNode.docs) ? folderNode.docs.slice() : [];
                var children = folderNode && folderNode.children ? Array.from(folderNode.children.values()) : [];

                docs.sort(compareDoc);
                children.sort(compareFolder);

                children.forEach(function (child) {
                    docs = docs.concat(collectDocsRecursively(child));
                });
                return docs;
            }

            function buildFolderDocGroups(folderNode) {
                var currentDocs = [];
                var childGroups = [];
                if (!folderNode) {
                    return {
                        currentDocs: currentDocs,
                        childGroups: childGroups
                    };
                }

                currentDocs = Array.isArray(folderNode.docs)
                    ? folderNode.docs.slice().sort(compareDoc).map(function (doc) { return doc.title; })
                    : [];

                var children = folderNode.children
                    ? Array.from(folderNode.children.values()).sort(compareFolder)
                    : [];
                children.forEach(function (child) {
                    var docs = collectDocsRecursively(child);
                    if (!docs.length) return;
                    childGroups.push({
                        label: child.name || ROOT_LABEL,
                        path: child.path || '',
                        totalDocs: docs.length,
                        hiddenDocCount: Math.max(0, docs.length - 3),
                        previewDocs: docs.slice(0, 3).map(function (doc) {
                            return doc.title;
                        })
                    });
                });

                return {
                    currentDocs: currentDocs,
                    childGroups: childGroups
                };
            }

            function buildRenderableGroups(folderNode) {
                var groups = [];
                if (!folderNode) return groups;

                var currentDocs = Array.isArray(folderNode.docs) ? folderNode.docs.slice().sort(compareDoc) : [];
                if (currentDocs.length) {
                    groups.push({
                        kind: 'current',
                        label: '本级文章',
                        path: folderNode.path || '',
                        totalDocs: currentDocs.length,
                        hiddenDocCount: 0,
                        docs: currentDocs.slice(0, 3),
                        isCurrent: true
                    });
                }

                var children = folderNode.children
                    ? Array.from(folderNode.children.values()).sort(compareFolder)
                    : [];
                children.forEach(function (child) {
                    var docs = collectDocsRecursively(child);
                    if (!docs.length) return;
                    groups.push({
                        kind: 'child',
                        label: child.name || ROOT_LABEL,
                        path: child.path || '',
                        totalDocs: docs.length,
                        hiddenDocCount: Math.max(0, docs.length - 3),
                        docs: docs.slice(0, 3),
                        isCurrent: false
                    });
                });

                return groups;
            }

            function buildBreadcrumbItems(folderNode) {
                var items = [];
                var folderPath = normalizePath(folderNode && folderNode.path || '');
                var parts = splitFolderPath(folderPath);

                items.push({
                    label: '文档',
                    path: '',
                    isCurrent: parts.length === 0
                });

                parts.forEach(function (part, index) {
                    items.push({
                        label: part,
                        path: parts.slice(0, index + 1).join('/'),
                        isCurrent: index === parts.length - 1
                    });
                });

                return items;
            }

            function buildFolderRenderState(folderNode) {
                var groups = buildRenderableGroups(folderNode);
                var allDocs = collectDocsRecursively(folderNode);

                return {
                    groups: groups,
                    allDocs: allDocs,
                    groupSummary: buildFolderDocGroups(folderNode),
                    breadcrumbItems: buildBreadcrumbItems(folderNode),
                    childCount: folderNode && folderNode.children ? folderNode.children.size : 0
                };
            }

            function estimateChipWidth(label, minWidth, maxWidth, paddingX) {
                var chars = Array.from(String(label || '')).length;
                return clamp(chars * 16 + (paddingX || 48), minWidth || 88, maxWidth || 320);
            }

            function layoutChips(items, options) {
                var placements = [];
                var startX = options.startX || 0;
                var cursorX = startX;
                var y = options.startY || 0;
                var itemHeight = options.itemHeight || 40;
                var maxX = startX + (options.maxWidth || 600);
                var gapX = options.gapX || 10;
                var gapY = options.gapY || 10;
                var bottomY = y;

                items.forEach(function (item) {
                    var width = estimateChipWidth(item.label, options.minWidth, options.maxItemWidth, options.paddingX);
                    if (cursorX + width > maxX && cursorX > startX) {
                        cursorX = startX;
                        y += itemHeight + gapY;
                    }

                    placements.push({
                        item: item,
                        x: cursorX,
                        y: y,
                        width: width,
                        height: itemHeight
                    });
                    cursorX += width + gapX;
                    bottomY = y + itemHeight;
                });

                return {
                    placements: placements,
                    bottomY: placements.length ? bottomY : (options.startY || 0)
                };
            }

            function focusStageOnPoint(point, behavior) {
                var stage = document.getElementById('main-content');
                if (!stage || !point) return;

                var maxLeft = Math.max(0, stage.scrollWidth - stage.clientWidth);
                var maxTop = Math.max(0, stage.scrollHeight - stage.clientHeight);
                stage.scrollTo({
                    left: clamp(point.x - stage.clientWidth / 2, 0, maxLeft),
                    top: clamp(point.y - stage.clientHeight / 2, 0, maxTop),
                    behavior: behavior || 'auto'
                });
            }

            function openDoc(docPath) {
                window.location.href = '/site/pages/viewer.html?file=' + encodeURIComponent(docPath);
            }

            function renderErrorMap(message) {
                var svg = document.getElementById('folder-map-svg');
                if (!svg) return;

                var palette = getPalette();
                var width = 1840;
                var height = 760;
                svg.innerHTML = '';
                svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
                svg.setAttribute('width', String(width));
                svg.setAttribute('height', String(height));
                svg.style.width = width + 'px';
                svg.style.height = height + 'px';
                state.groupLayoutByPath = new Map();
                state.docLayoutByPath = new Map();

                var backgroundLayer = createSvgEl('g');
                var nodeLayer = createSvgEl('g');
                svg.appendChild(backgroundLayer);
                svg.appendChild(nodeLayer);

                backgroundLayer.appendChild(createSvgEl('rect', {
                    x: '0',
                    y: '0',
                    width: String(width),
                    height: String(height),
                    fill: palette.bg
                }));

                backgroundLayer.appendChild(createSvgEl('rect', {
                    x: '24',
                    y: '24',
                    width: String(width - 48),
                    height: '180',
                    rx: '24',
                    ry: '24',
                    fill: palette.surface,
                    stroke: palette.border,
                    'stroke-width': '1.4',
                    opacity: '0.9'
                }));

                appendText(nodeLayer, {
                    x: 72,
                    y: 70,
                    text: '目录导航加载失败',
                    fill: palette.text,
                    size: 28,
                    weight: 700
                });
                appendText(nodeLayer, {
                    x: 72,
                    y: 104,
                    text: '请刷新页面后重试，或返回上一级目录重新进入。',
                    fill: palette.muted,
                    size: 14,
                    weight: 400
                });

                drawNode(nodeLayer, {
                    cx: width / 2,
                    cy: height / 2,
                    width: 460,
                    height: 118,
                    radius: 18,
                    fill: palette.surface,
                    stroke: palette.next,
                    strokeWidth: 2.6,
                    textColor: palette.text,
                    title: '目录数据不可用',
                    titleSize: 22,
                    subtitle: message || '加载目录数据失败，请稍后重试。',
                    subtitleSize: 13,
                    subtitleMax: 42
                });
            }

            function renderMap(folderNode, renderState, options) {
                var svg = document.getElementById('folder-map-svg');
                if (!svg) return;

                var palette = getPalette();
                var opts = options || {};
                var groups = renderState.groups;
                var allDocs = renderState.allDocs;
                var width = 1520;
                var safe = 10;
                var centerX = width / 2;
                var rootWidth = 360;
                var rootHeight = 74;
                var groupWidth = 196;
                var groupHeight = 62;
                var cardWidth = 240;
                var cardHeight = 66;
                var cardGap = 12;
                var groupGapY = 26;
                var overflowHeight = 30;
                var maxColumns = 4;
                var breadcrumbLayout;
                var headerBottom;
                var rootCenterY;
                var rootBottomY;
                var rowLayouts = [];
                var currentY;
                var contentBottom;
                var height;
                var backgroundLayer;
                var relationLayer;
                var nodeLayer;
                var headerLayer;
                var viewTarget;
                var parentPath = getParentPath(state.currentPath);
                var backChipWidth = 132;
                var backChipHeight = 34;
                var rowIndex;

                state.groupLayoutByPath = new Map();
                state.docLayoutByPath = new Map();

                breadcrumbLayout = layoutChips(renderState.breadcrumbItems.map(function (item) {
                    return {
                        label: item.label || ROOT_LABEL,
                        path: item.path,
                        isCurrent: item.isCurrent
                    };
                }), {
                    startX: safe + 2,
                    startY: safe + 8,
                    maxWidth: width - safe * 2 - (folderNode.path ? (backChipWidth + 18) : 0),
                    itemHeight: 34,
                    gapX: 8,
                    gapY: 8,
                    minWidth: 84,
                    maxItemWidth: 240,
                    paddingX: 42
                });

                headerBottom = breadcrumbLayout.bottomY + safe + 6;
                rootCenterY = headerBottom + 56;
                rootBottomY = rootCenterY + rootHeight / 2;
                currentY = rootBottomY + 70;

                for (rowIndex = 0; rowIndex * maxColumns < groups.length; rowIndex += 1) {
                    var rowGroups = groups.slice(rowIndex * maxColumns, rowIndex * maxColumns + maxColumns);
                    var rowCount = rowGroups.length;
                    var availableWidth = width - safe * 2;
                    var columnWidth = availableWidth / Math.max(1, rowCount);
                    var rowHeight = 0;
                    var placements = [];

                    rowGroups.forEach(function (group, columnIndex) {
                        var docCount = group.docs.length;
                        var overflowVisible = group.hiddenDocCount > 0;
                        var blockHeight = groupHeight
                            + (docCount ? groupGapY + docCount * cardHeight + Math.max(0, docCount - 1) * cardGap : 0)
                            + (overflowVisible ? (cardGap + overflowHeight) : 0);
                        rowHeight = Math.max(rowHeight, blockHeight);
                        placements.push({
                            group: group,
                            centerX: safe + columnWidth * columnIndex + columnWidth / 2,
                            blockHeight: blockHeight
                        });
                    });

                    rowLayouts.push({
                        topY: currentY,
                        trunkY: currentY - 22,
                        height: rowHeight,
                        placements: placements
                    });
                    currentY += rowHeight + 58;
                }

                contentBottom = rowLayouts.length ? (currentY - 18) : (rootBottomY + 170);
                height = Math.max(760, contentBottom + safe);

                svg.innerHTML = '';
                svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
                svg.setAttribute('width', String(width));
                svg.setAttribute('height', String(height));
                svg.style.width = width + 'px';
                svg.style.height = height + 'px';

                backgroundLayer = createSvgEl('g');
                headerLayer = createSvgEl('g');
                relationLayer = createSvgEl('g');
                nodeLayer = createSvgEl('g');
                svg.appendChild(backgroundLayer);
                svg.appendChild(headerLayer);
                svg.appendChild(relationLayer);
                svg.appendChild(nodeLayer);

                backgroundLayer.appendChild(createSvgEl('rect', {
                    x: '0',
                    y: '0',
                    width: String(width),
                    height: String(height),
                    fill: palette.bg
                }));

                backgroundLayer.appendChild(createSvgEl('rect', {
                    x: String(safe),
                    y: String(safe),
                    width: String(width - safe * 2),
                    height: String(height - safe * 2),
                    rx: '20',
                    ry: '20',
                    fill: palette.surface,
                    stroke: palette.border,
                    'stroke-width': '1.2',
                    'stroke-opacity': '0.78'
                }));

                backgroundLayer.appendChild(createSvgEl('rect', {
                    x: String(safe + 10),
                    y: String(safe + 10),
                    width: String(width - safe * 2 - 20),
                    height: String(height - safe * 2 - 20),
                    rx: '16',
                    ry: '16',
                    fill: palette.bg,
                    'fill-opacity': '0.82'
                }));

                appendText(headerLayer, {
                    x: safe + 8,
                    y: safe + 60,
                    text: '目录树导航',
                    fill: palette.muted,
                    size: 14,
                    weight: 700
                });
                appendText(headerLayer, {
                    x: width - safe - 8,
                    y: safe + 60,
                    text: '子目录 ' + renderState.childCount + ' · 文章 ' + allDocs.length,
                    fill: palette.muted,
                    size: 14,
                    weight: 700,
                    anchor: 'end'
                });

                breadcrumbLayout.placements.forEach(function (placement) {
                    var item = placement.item;
                    drawChip(headerLayer, {
                        x: placement.x,
                        y: placement.y,
                        width: placement.width,
                        height: placement.height,
                        fill: item.isCurrent ? palette.primary : palette.bg,
                        stroke: item.isCurrent ? palette.primary : palette.border,
                        strokeWidth: item.isCurrent ? 2 : 1.4,
                        textColor: item.isCurrent ? '#ffffff' : palette.text,
                        label: item.label,
                        titleMax: 20,
                        tooltip: item.path || '文档入口',
                        onClick: item.isCurrent ? null : function () {
                            navigateTo(item.path, false);
                        }
                    });
                });

                if (folderNode.path) {
                    var backChip = drawChip(headerLayer, {
                        x: width - safe - backChipWidth,
                        y: safe + 8,
                        width: backChipWidth,
                        height: backChipHeight,
                        fill: palette.bg,
                        stroke: palette.next,
                        strokeWidth: 1.8,
                        textColor: palette.text,
                        label: '返回上一级',
                        titleMax: 18,
                        tooltip: parentPath,
                        onClick: function () {
                            navigateTo(parentPath, false);
                        }
                    });
                    backChip.setAttribute('data-nav-role', 'go-parent');
                }

                drawNode(nodeLayer, {
                    cx: centerX,
                    cy: rootCenterY,
                    width: rootWidth,
                    height: rootHeight,
                    radius: 16,
                    fill: '#1d2b47',
                    stroke: '#253a63',
                    strokeWidth: 2.2,
                    textColor: '#ffffff',
                    title: folderNode.name || ROOT_LABEL,
                    titleLines: wrapTextLines(folderNode.name || ROOT_LABEL, 18, 2),
                    titleSize: 20,
                    titleLineHeight: 22,
                    subtitle: renderState.childCount + ' 个子目录 · ' + allDocs.length + ' 篇文章',
                    subtitleSize: 12,
                    subtitleMax: 28,
                    tooltip: folderNode.path || ROOT_LABEL
                });

                if (rowLayouts.length) {
                    relationLayer.appendChild(createSvgEl('path', {
                        d: polylinePath([
                            { x: centerX, y: rootBottomY },
                            { x: centerX, y: rowLayouts[rowLayouts.length - 1].trunkY }
                        ]),
                        fill: 'none',
                        stroke: palette.line,
                        'stroke-width': '2.2',
                        'stroke-opacity': '0.88',
                        'stroke-linecap': 'round'
                    }));
                }

                rowLayouts.forEach(function (rowLayout, rowLayoutIndex) {
                    if (!rowLayout.placements.length) return;

                    var minX = rowLayout.placements[0].centerX;
                    var maxX = rowLayout.placements[rowLayout.placements.length - 1].centerX;
                    relationLayer.appendChild(createSvgEl('path', {
                        d: polylinePath([
                            { x: minX, y: rowLayout.trunkY },
                            { x: maxX, y: rowLayout.trunkY }
                        ]),
                        fill: 'none',
                        stroke: palette.line,
                        'stroke-width': '2',
                        'stroke-opacity': rowLayoutIndex === 0 ? '0.9' : '0.74',
                        'stroke-linecap': 'round'
                    }));

                    rowLayout.placements.forEach(function (placement) {
                        var group = placement.group;
                        var groupCenterY = rowLayout.topY + groupHeight / 2;
                        var groupColor = group.kind === 'current' ? '#304462' : palette.folder;
                        var groupFill = group.kind === 'current' ? '#25334b' : palette.folder;
                        var previewSubtitle = group.kind === 'current'
                            ? '当前目录内的文章'
                            : (group.hiddenDocCount > 0
                                ? '预览 3 / ' + group.totalDocs + ' 篇'
                                : '共 ' + group.totalDocs + ' 篇');

                        relationLayer.appendChild(createSvgEl('path', {
                            d: polylinePath([
                                { x: placement.centerX, y: rowLayout.trunkY },
                                { x: placement.centerX, y: groupCenterY - groupHeight / 2 }
                            ]),
                            fill: 'none',
                            stroke: groupColor,
                            'stroke-width': '2',
                            'stroke-opacity': '0.84',
                            'stroke-linecap': 'round'
                        }));

                        var groupNode = drawNode(nodeLayer, {
                            cx: placement.centerX,
                            cy: groupCenterY,
                            width: groupWidth,
                            height: groupHeight,
                            radius: 12,
                            fill: groupFill,
                            stroke: groupColor,
                            strokeWidth: group.kind === 'current' ? 1.8 : 2.1,
                            textColor: '#ffffff',
                            title: group.label,
                            titleLines: wrapTextLines(group.label, 10, 2),
                            titleSize: 15,
                            titleLineHeight: 17,
                            subtitle: previewSubtitle,
                            subtitleSize: 11,
                            subtitleMax: 20,
                            tooltip: group.path || '当前目录',
                            onClick: group.kind === 'child' ? function () {
                                navigateTo(group.path, false);
                            } : null
                        });
                        if (group.kind === 'child') {
                            groupNode.setAttribute('data-folder-path', group.path);
                        } else {
                            groupNode.setAttribute('data-group-kind', 'current-docs');
                        }

                        state.groupLayoutByPath.set(normalizePath(group.path || ('row-' + rowLayoutIndex + '-' + placement.centerX)), {
                            x: placement.centerX,
                            y: groupCenterY
                        });

                        var lastConnectorY = groupCenterY + groupHeight / 2;
                        group.docs.forEach(function (doc, docIndex) {
                            var cardCenterY = groupCenterY + groupHeight / 2 + groupGapY + cardHeight / 2 + docIndex * (cardHeight + cardGap);
                            var subtitle = String(doc.author || '').trim();
                            if (!subtitle || subtitle === '未知') {
                                subtitle = String(doc.path || '').split('/').slice(-2).join('/');
                            }

                            relationLayer.appendChild(createSvgEl('path', {
                                d: polylinePath([
                                    { x: placement.centerX, y: lastConnectorY },
                                    { x: placement.centerX, y: cardCenterY - cardHeight / 2 }
                                ]),
                                fill: 'none',
                                stroke: groupColor,
                                'stroke-width': '1.8',
                                'stroke-opacity': '0.7',
                                'stroke-linecap': 'round'
                            }));
                            lastConnectorY = cardCenterY + cardHeight / 2;

                            var docNode = drawNode(nodeLayer, {
                                cx: placement.centerX,
                                cy: cardCenterY,
                                width: cardWidth,
                                height: cardHeight,
                                radius: 10,
                                fill: '#f3f6fb',
                                stroke: '#d8dfeb',
                                strokeWidth: 1.5,
                                textColor: '#18212f',
                                subTextColor: '#5d6a7d',
                                title: doc.title,
                                titleLines: wrapTextLines(doc.title, 16, 2),
                                titleSize: 14,
                                titleLineHeight: 18,
                                subtitle: subtitle,
                                subtitleSize: 11,
                                subtitleMax: 22,
                                tooltip: doc.path,
                                onClick: function () {
                                    openDoc(doc.path);
                                }
                            });
                            docNode.setAttribute('data-doc-path', doc.path);
                            docNode.setAttribute('data-doc-title', doc.title);
                            state.docLayoutByPath.set(doc.path, {
                                x: placement.centerX,
                                y: cardCenterY
                            });
                        });

                        if (group.hiddenDocCount > 0) {
                            var overflowY = lastConnectorY + cardGap + overflowHeight / 2;
                            relationLayer.appendChild(createSvgEl('path', {
                                d: polylinePath([
                                    { x: placement.centerX, y: lastConnectorY },
                                    { x: placement.centerX, y: overflowY - overflowHeight / 2 }
                                ]),
                                fill: 'none',
                                stroke: groupColor,
                                'stroke-width': '1.6',
                                'stroke-opacity': '0.64',
                                'stroke-linecap': 'round'
                            }));

                            var overflowChip = drawChip(nodeLayer, {
                                x: placement.centerX - 62,
                                y: overflowY - overflowHeight / 2,
                                width: 124,
                                height: overflowHeight,
                                radius: 15,
                                fill: palette.bg,
                                stroke: groupColor,
                                strokeWidth: 1.4,
                                textColor: palette.text,
                                label: '另有 ' + group.hiddenDocCount + ' 篇',
                                titleMax: 16,
                                tooltip: group.path,
                                onClick: group.kind === 'child' ? function () {
                                    navigateTo(group.path, false);
                                } : null
                            });
                            overflowChip.setAttribute('data-overflow-count', String(group.hiddenDocCount));
                        }
                    });
                });

                if (!groups.length) {
                    drawNode(nodeLayer, {
                        cx: centerX,
                        cy: rootBottomY + 110,
                        width: 360,
                        height: 96,
                        radius: 14,
                        fill: palette.surface,
                        stroke: palette.border,
                        strokeWidth: 1.6,
                        textColor: palette.text,
                        title: '当前目录暂无内容',
                        titleSize: 18,
                        subtitle: folderNode.path ? '可以返回上一级继续浏览。' : '请从上方路径切换到其他目录。',
                        subtitleSize: 12,
                        subtitleMax: 28
                    });
                }

                viewTarget = opts.focusGroupPath != null
                    ? state.groupLayoutByPath.get(normalizePath(opts.focusGroupPath))
                    : null;
                if (!viewTarget) {
                    viewTarget = { x: centerX, y: rootCenterY + 40 };
                }

                window.requestAnimationFrame(function () {
                    focusStageOnPoint(viewTarget, opts.focusBehavior || 'auto');
                });
            }

            function refreshFolderView(folderNode, options) {
                var renderState = buildFolderRenderState(folderNode);
                renderMap(folderNode, renderState, options || {});
            }

            function applyPathToUrl(path, replace) {
                var normalized = normalizePath(path);
                var url = new URL(window.location.href);
                if (normalized) {
                    url.searchParams.set('path', normalized);
                } else {
                    url.searchParams.delete('path');
                }

                if (replace) {
                    window.history.replaceState({ path: normalized }, '', url.toString());
                } else {
                    window.history.pushState({ path: normalized }, '', url.toString());
                }
            }

            function navigateTo(path, replaceState) {
                var normalized = normalizePath(path);
                var node = getFolderNode(normalized);
                if (!node) {
                    normalized = '';
                    node = state.tree;
                }

                state.currentPath = normalized;
                state.activeGroupPath = normalized;
                state.loadError = '';
                updateSeo(normalized);
                applyPathToUrl(normalized, !!replaceState);
                refreshFolderView(node, {
                    focusGroupPath: normalized,
                    focusBehavior: replaceState ? 'auto' : 'smooth'
                });
            }

            async function loadConfig() {
                var config;
                if (window.SiteConfig && typeof window.SiteConfig.load === 'function') {
                    config = await window.SiteConfig.load();
                } else {
                    var response = await fetch('/site/content/config.json');
                    if (!response.ok) throw new Error('无法加载配置文件: ' + response.status);
                    config = await response.json();
                }

                var rawDocs = Array.isArray(config && config.all_files) ? config.all_files : [];
                var docs = rawDocs.map(normalizeDoc).filter(Boolean);

                state.allDocs = docs;
                state.docByPath = new Map();
                docs.forEach(function (doc) {
                    state.docByPath.set(doc.path, doc);
                });
                state.tree = buildTree(docs);
            }

            function bindEvents() {
                window.addEventListener('popstate', function () {
                    var path = getFolderPathFromURL();
                    var node = getFolderNode(path);
                    if (!node) path = '';
                    state.currentPath = path;
                    state.activeGroupPath = path;
                    updateSeo(path);
                    refreshFolderView(getFolderNode(path), {
                        focusGroupPath: path,
                        focusBehavior: 'auto'
                    });
                });

                window.addEventListener('themechange', function () {
                    var node = getFolderNode(state.currentPath || '');
                    if (node) {
                        refreshFolderView(node, {
                            focusGroupPath: state.activeGroupPath || state.currentPath || '',
                            focusBehavior: 'auto'
                        });
                    }
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                loadConfig().then(function () {
                    bindEvents();
                    navigateTo(getFolderPathFromURL(), true);
                }).catch(function (error) {
                    console.error('folder.html 初始化失败:', error);
                    state.loadError = '加载目录数据失败，请稍后重试。';
                    renderErrorMap(state.loadError);
                });
            });
        })();
    </script>
</body>
</html>
