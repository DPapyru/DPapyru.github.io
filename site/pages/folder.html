    <style>
        body.folder-catalog-page .workbench-main.folder-main {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 16px 22px 18px;
            min-height: 0;
            border-left: none;
            border-right: none;
            background: transparent;
        }

        .folder-layout {
            display: grid;
            grid-template-columns: minmax(250px, 320px) minmax(0, 1fr);
            gap: 14px;
            height: 100%;
            min-height: 580px;
        }

        .folder-sidebar,
        .folder-article-panel {
            background: color-mix(in srgb, var(--bg-secondary) 88%, transparent);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .folder-sidebar {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .folder-sidebar-head {
            padding: 14px 14px 8px;
            border-bottom: 1px solid color-mix(in srgb, var(--border-color) 75%, transparent);
        }

        .folder-sidebar-title {
            margin: 0;
            font-size: 1.05rem;
            color: var(--text-color);
            letter-spacing: 0.2px;
        }

        .folder-sidebar-note {
            margin: 8px 0 0;
            color: var(--text-secondary);
            font-size: 0.86rem;
            line-height: 1.45;
        }

        .folder-folder-tree {
            padding: 10px;
            overflow: auto;
            min-height: 0;
        }

        .folder-folder-tree .learn-tree-root,
        .folder-folder-tree .learn-tree-children {
            --learn-tree-row-height: 32px;
            margin: 0;
            padding: 0;
        }

        .folder-folder-tree .learn-tree-item {
            min-height: 32px;
            border-radius: 6px;
            padding: 4px 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .folder-folder-tree .learn-tree-label,
        .folder-folder-tree .learn-tree-link-label {
            position: relative;
            display: block;
            min-width: 0;
            padding-left: 24px;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            gap: 0;
        }

        .folder-folder-tree .learn-tree-label::before,
        .folder-folder-tree .learn-tree-link-label::before {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .folder-folder-tree .learn-tree-folder.is-active > .learn-tree-row .learn-tree-item {
            background-color: var(--sidebar-active) !important;
            color: var(--primary-color) !important;
            border-left: 2px solid var(--primary-color);
            border-radius: 0 6px 6px 0;
            padding-left: 8px;
        }

        .folder-folder-tree .learn-tree-folder.is-active > .learn-tree-row .learn-tree-label::before {
            color: var(--primary-color);
        }

        .folder-folder-tree .learn-tree-toggle {
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 1px solid color-mix(in srgb, var(--border-color) 85%, transparent);
            border-radius: 4px;
            background: color-mix(in srgb, var(--bg-color) 82%, transparent);
            color: var(--text-secondary);
            font-size: 0;
            line-height: 1;
            flex: 0 0 18px;
            overflow: visible;
        }

        .folder-folder-tree .learn-tree-toggle::before {
            content: '▾';
            display: block;
            font-size: 11px;
            text-align: center;
            line-height: 16px;
        }

        .folder-folder-tree .learn-tree-folder[data-collapsed="1"] > .learn-tree-row .learn-tree-toggle::before {
            content: '▸';
        }

        .folder-folder-tree .learn-tree-toggle:hover,
        .folder-folder-tree .learn-tree-toggle:focus-visible {
            background: color-mix(in srgb, var(--primary-color) 14%, var(--bg-color));
            color: var(--primary-color);
            border-color: color-mix(in srgb, var(--primary-color) 62%, transparent);
        }

        .folder-folder-tree .learn-tree-open-folder {
            margin-left: auto;
            height: 22px;
            min-width: 40px;
            padding: 0 8px;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, var(--border-color) 78%, transparent);
            background: color-mix(in srgb, var(--bg-secondary) 66%, transparent);
            color: var(--text-secondary);
            font-size: 0.72rem;
            line-height: 1;
            cursor: pointer;
        }

        .folder-folder-tree .learn-tree-open-folder:hover,
        .folder-folder-tree .learn-tree-open-folder:focus-visible {
            color: var(--primary-color);
            border-color: color-mix(in srgb, var(--primary-color) 58%, transparent);
            background: color-mix(in srgb, var(--primary-color) 12%, var(--bg-color));
        }

        .folder-article-panel {
            --folder-group-glyph-font: "JetBrainsMonoNerdFontBold", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .folder-panel-toolbar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px;
            border-bottom: 1px solid color-mix(in srgb, var(--border-color) 75%, transparent);
        }

        .folder-toolbar-main {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .folder-path-wrap {
            min-width: 0;
        }

        .folder-path-wrap-label {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        #folder-current-path {
            display: block;
            margin-top: 3px;
            color: var(--text-color);
            font-size: 1.02rem;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .folder-toolbar-stats {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .folder-toolbar-stat {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, var(--border-color) 80%, transparent);
            background: color-mix(in srgb, var(--bg-color) 86%, transparent);
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        .folder-toolbar-stat strong {
            color: var(--text-color);
            font-weight: 700;
        }

        .folder-toolbar-controls {
            display: grid;
            grid-template-columns: minmax(190px, 320px) 120px;
            gap: 8px;
            align-items: center;
        }

        .folder-toolbar-controls label {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            border: 0;
            padding: 0;
            clip: rect(0 0 0 0);
            overflow: hidden;
        }

        #folder-search-input,
        #folder-sort-select {
            background: color-mix(in srgb, var(--bg-color) 88%, transparent);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.9rem;
            width: 100%;
        }

        #folder-search-input:focus,
        #folder-sort-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary-color) 26%, transparent);
        }

        .folder-panel-meta {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            border-bottom: 1px solid color-mix(in srgb, var(--border-color) 65%, transparent);
            font-size: 0.86rem;
            flex-wrap: wrap;
        }

        #folder-total-count {
            color: var(--text-color);
            font-weight: 650;
        }

        .folder-article-list {
            padding: 10px 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: auto;
            min-height: 0;
        }

        .folder-group {
            border: 1px solid color-mix(in srgb, var(--border-color) 82%, transparent);
            border-radius: 10px;
            background: color-mix(in srgb, var(--bg-color) 86%, transparent);
            overflow: hidden;
        }

        .folder-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid color-mix(in srgb, var(--border-color) 70%, transparent);
            background: color-mix(in srgb, var(--bg-secondary) 78%, transparent);
            cursor: pointer;
            user-select: none;
        }

        .folder-group-title-wrap {
            flex: 1 1 auto;
            min-width: 0;
            display: inline-flex;
            align-items: center;
            gap: 0;
        }

        .folder-group-toggle {
            display: none;
        }

        .folder-group-title {
            position: relative;
            display: block;
            min-width: 0;
            padding-left: 22px;
            color: var(--text-color);
            font-size: 0.86rem;
            font-weight: 650;
            line-height: 1.25;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-group-title::before {
            content: '\f07c';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--folder-group-glyph-font);
            font-size: 16px;
            line-height: 1;
            color: var(--text-secondary);
            flex: 0 0 auto;
            margin-right: 0;
        }

        .folder-group-count {
            color: var(--text-secondary);
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .folder-group[data-collapsed="1"] > .folder-group-header .folder-group-title::before {
            content: '\f07b';
        }

        .folder-group-list {
            display: flex;
            flex-direction: column;
            border: 1px dashed color-mix(in srgb, var(--border-color) 66%, transparent);
            border-radius: 8px;
            overflow: hidden;
            background: color-mix(in srgb, var(--bg-color) 90%, transparent);
        }

        .folder-group-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .folder-group[data-collapsed="1"] > .folder-group-header {
            border-bottom: none;
        }

        .folder-group[data-collapsed="1"] > .folder-group-body {
            display: none;
        }

        .folder-group-children {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .folder-group[data-depth="0"] > .folder-group-body {
            padding: 10px;
        }

        .folder-group .folder-group {
            margin-left: 8px;
        }

        .folder-doc-card {
            display: block;
            padding: 12px;
            border-top: 1px dashed color-mix(in srgb, var(--border-color) 70%, transparent);
            min-width: 0;
            background: transparent;
        }

        .folder-doc-card:first-child {
            border-top: none;
        }

        .folder-doc-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: 12px;
        }

        .folder-doc-meta-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .folder-doc-title-link {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            line-height: 1.35;
            font-weight: 650;
            word-break: break-word;
        }

        .folder-doc-title-link:hover {
            color: var(--primary-color);
        }

        .folder-doc-desc {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.86rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .folder-meta-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            min-height: 24px;
        }

        .folder-meta-pill {
            display: inline-flex;
            align-items: center;
            max-width: 100%;
            font-size: 0.76rem;
            border: 1px solid color-mix(in srgb, var(--border-color) 78%, transparent);
            border-radius: 999px;
            color: var(--text-secondary);
            padding: 3px 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: color-mix(in srgb, var(--bg-secondary) 65%, transparent);
        }

        .folder-meta-pill--difficulty {
            border-color: color-mix(in srgb, var(--primary-color) 65%, transparent);
            color: color-mix(in srgb, var(--primary-color) 85%, #ffffff);
        }

        .folder-prefix-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            min-height: 20px;
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        .folder-prefix-label {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .folder-prefix-link {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px dotted color-mix(in srgb, var(--link-color) 58%, transparent);
        }

        .folder-prefix-link:hover {
            color: var(--primary-color);
            border-bottom-color: color-mix(in srgb, var(--primary-color) 60%, transparent);
        }

        .folder-doc-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 90px;
        }

        .folder-doc-link {
            color: var(--link-color);
            font-size: 0.84rem;
            text-decoration: none;
            font-weight: 620;
        }

        .folder-doc-link:hover {
            color: var(--primary-color);
        }

        .folder-empty {
            margin: 16px;
            padding: 18px;
            border-radius: 10px;
            border: 1px dashed color-mix(in srgb, var(--border-color) 75%, transparent);
            color: var(--text-secondary);
            background: color-mix(in srgb, var(--bg-color) 82%, transparent);
        }

        @media (max-width: 1100px) {
            .folder-layout {
                grid-template-columns: 290px minmax(0, 1fr);
            }

            .folder-toolbar-controls {
                grid-template-columns: 1fr;
                width: min(320px, 100%);
            }

            .folder-toolbar-main {
                flex-direction: column;
                align-items: flex-start;
            }

            .folder-toolbar-stats {
                justify-content: flex-start;
            }
        }

        @media (max-width: 960px) {
            body.folder-catalog-page .workbench-main.folder-main {
                border-left: none;
                border-right: none;
                padding: 10px;
            }

            .folder-layout {
                grid-template-columns: 1fr;
                min-height: 0;
            }

            .folder-sidebar {
                max-height: 44vh;
            }

            .folder-toolbar-controls {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .folder-article-list {
                gap: 10px;
                padding: 8px;
            }

            .folder-doc-card {
                padding: 10px;
            }

            .folder-doc-main {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .folder-doc-actions {
                justify-content: flex-start;
            }

            .folder-panel-meta {
                gap: 8px;
            }
        }
    </style>
</head>

    <main class="workbench-main folder-main" id="main-content" tabindex="-1">
        <div class="folder-layout" id="folder-layout">
            <aside class="folder-sidebar" id="folder-sidebar" aria-label="目录导航">
                <div class="folder-sidebar-head">
                    <h2 class="folder-sidebar-title">目录导航</h2>
                    <p class="folder-sidebar-note">目录下文章不会按学习路径分流</p>
                </div>
                <div class="folder-folder-tree" id="folder-folder-tree"></div>
            </aside>

            <section class="folder-article-panel" id="folder-article-panel" aria-label="文章列表">
                <div class="folder-panel-toolbar">
                    <div class="folder-toolbar-main">
                        <div class="folder-path-wrap">
                            <p class="folder-path-wrap-label">当前路径</p>
                            <strong id="folder-current-path">全部目录</strong>
                        </div>
                        <div class="folder-toolbar-stats" aria-live="polite">
                            <span class="folder-toolbar-stat"><strong id="folder-subfolder-count">0</strong> 子目录</span>
                            <span class="folder-toolbar-stat"><strong id="folder-raw-count">0</strong> 原始文章</span>
                        </div>
                    </div>
                    <div class="folder-toolbar-controls">
                        <label for="folder-search-input">搜索当前目录</label>
                        <input id="folder-search-input" type="search" placeholder="搜索标题、描述、标签或作者" autocomplete="off">
                        <label for="folder-sort-select">排序方式</label>
                        <select id="folder-sort-select">
                            <option value="order">按顺序</option>
                            <option value="date">按日期</option>
                            <option value="title">按标题</option>
                        </select>
                    </div>
                </div>
                <div class="folder-panel-meta">
                    <span id="folder-total-count">0</span>
                    <span>篇文章</span>
                    <span>·</span>
                    <span>支持 Markdown 元数据多文章目录</span>
                </div>
                <div class="folder-empty" id="folder-empty" hidden>当前筛选条件下暂无文章。</div>
                <div class="folder-article-list" id="folder-article-list"></div>
            </section>
        </div>
    </main>

    <div class="workbench-statusbar" role="status" aria-label="页面状态栏"><span class="workbench-statusbar-item">SWISS WORKBENCH</span><span class="workbench-statusbar-sep" aria-hidden="true">|</span><span class="workbench-statusbar-item">LAYOUT: FOLDER CATALOG</span><span class="workbench-statusbar-spacer"></span><span class="workbench-statusbar-item">THEME: ACCENT</span></div>

    <script src="/shared/assets/js/site-core.js"></script>
    <script>
        if (window.SITE) window.SITE.bootstrapPage('folder');
    </script>
    <script src="/site/assets/js/site-config.js"></script>
    <script src="/site/assets/js/accent-theme.js"></script>
    <script src="/site/assets/js/main.js"></script>
    <script src="/site/assets/js/navigation.js"></script>

    <script>
        (function () {
            var ROOT_LABEL = '绿群教程';
            var DEFAULT_SORT = 'order';
            var ALLOWED_SORTS = new Set(['order', 'date', 'title']);
            var ARTICLE_PROGRESS_STORAGE_KEY = 'folderArticlePanelProgress:v1';
            var GROUP_COLLAPSE_STORAGE_KEY = 'folderGroupCollapse:v1';
            var MAX_ARTICLE_PROGRESS_ENTRIES = 160;
            var MAX_GROUP_COLLAPSE_ENTRIES = 480;
            var groupBodyIdSeed = 0;

            var state = {
                allDocs: [],
                tree: null,
                currentPath: '',
                query: '',
                sort: DEFAULT_SORT,
                currentArticleProgressKey: ''
            };

            var refs = {
                tree: null,
                articlePanel: null,
                list: null,
                empty: null,
                search: null,
                sort: null,
                path: null,
                total: null
            };

            function normalizePath(value) {
                return String(value || '')
                    .replace(/\\/g, '/')
                    .replace(/^\/+|\/+$/g, '')
                    .replace(/\/+/g, '/');
            }

            function splitPath(pathValue) {
                var normalized = normalizePath(pathValue);
                return normalized ? normalized.split('/').filter(Boolean) : [];
            }

            function normalizeTags(rawTags) {
                var source = Array.isArray(rawTags)
                    ? rawTags
                    : String(rawTags || '')
                        .split(/[;,，]/)
                        .map(function (item) { return item.trim(); })
                        .filter(Boolean);
                var deduped = [];
                var seen = new Set();
                source.forEach(function (tag) {
                    var value = String(tag || '').trim();
                    if (!value || seen.has(value)) return;
                    seen.add(value);
                    deduped.push(value);
                });
                return deduped;
            }

            function parseMarkdownLink(text) {
                var raw = String(text || '').trim();
                if (!raw) return null;
                var match = raw.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
                if (!match) return null;
                var label = String(match[1] || '').trim();
                var target = normalizePath(match[2] || '');
                if (!label || !target || !/\.md$/i.test(target)) return null;
                return {
                    label: label,
                    path: target,
                    raw: raw
                };
            }

            function normalizePrefixLinks(rawPrefix) {
                var source = Array.isArray(rawPrefix)
                    ? rawPrefix
                    : String(rawPrefix || '')
                        .split(/\r?\n/)
                        .map(function (line) { return line.trim(); })
                        .filter(Boolean);
                var output = [];
                var seen = new Set();
                source.forEach(function (item) {
                    var parsed = parseMarkdownLink(item);
                    if (!parsed) return;
                    if (seen.has(parsed.path)) return;
                    seen.add(parsed.path);
                    output.push(parsed);
                });
                return output;
            }

            function toOrder(value) {
                var parsed = Number.parseInt(value, 10);
                return Number.isFinite(parsed) ? parsed : 999;
            }

            function normalizeDoc(raw) {
                var source = raw && typeof raw === 'object' ? raw : {};
                var docPath = normalizePath(source.path || source.filename || '');
                if (!docPath || !/\.md$/i.test(docPath)) return null;

                var tags = normalizeTags(source.tags || source.tag || source.keywords);
                var folder = normalizePath(source.folder || docPath.split('/').slice(0, -1).join('/'));

                if (source.is_hidden === true || source.hide === true || source.hide === 'true') {
                    return null;
                }

                return {
                    filename: source.filename || docPath.split('/').pop() || '',
                    path: docPath,
                    title: source.title || docPath.split('/').pop().replace(/\.md$/i, ''),
                    description: source.description || '暂无描述',
                    author: source.author || '未知',
                    category: source.category || '未分类',
                    topic: source.topic || 'unknown',
                    order: toOrder(source.order),
                    difficulty: source.difficulty || 'beginner',
                    time: source.time || '不具体',
                    date: String(source.date || ''),
                    last_updated: String(source.last_updated || ''),
                    reading_time: String(source.reading_time || ''),
                    tags: tags,
                    prefix: normalizePrefixLinks(source.prefix),
                    folder: folder,
                    slug: String(source.slug || docPath.replace(/\.md$/i, ''))
                };
            }

            function createFolderNode(name, pathValue, parent) {
                return {
                    name: name,
                    path: pathValue,
                    parent: parent,
                    docs: [],
                    children: new Map()
                };
            }

            function buildFolderIndex(docs) {
                var root = createFolderNode(ROOT_LABEL, '', null);
                docs.forEach(function (doc) {
                    var parts = splitPath(doc.path);
                    var fileName = parts.pop();
                    if (!fileName) return;

                    var current = root;
                    var currentPath = '';
                    parts.forEach(function (part) {
                        currentPath = currentPath ? currentPath + '/' + part : part;
                        if (!current.children.has(part)) {
                            current.children.set(part, createFolderNode(part, currentPath, current));
                        }
                        current = current.children.get(part);
                    });
                    current.docs.push(doc);
                });

                return root;
            }

            function getFolderNode(pathValue) {
                var normalized = normalizePath(pathValue);
                if (!normalized) return state.tree;

                var parts = splitPath(normalized);
                var current = state.tree;
                for (var i = 0; i < parts.length; i += 1) {
                    if (!current || !current.children.has(parts[i])) return null;
                    current = current.children.get(parts[i]);
                }
                return current;
            }

            function collectDocsRecursively(folderNode) {
                if (!folderNode) return [];
                var docs = Array.isArray(folderNode.docs) ? folderNode.docs.slice() : [];
                var children = folderNode.children ? Array.from(folderNode.children.values()) : [];
                children.sort(function (left, right) {
                    return String(left.name || '').localeCompare(String(right.name || ''), 'zh-CN');
                });
                children.forEach(function (child) {
                    docs = docs.concat(collectDocsRecursively(child));
                });
                return docs;
            }

            function compareDocs(left, right, sortKey) {
                if (sortKey === 'title') {
                    return String(left.title || '').localeCompare(String(right.title || ''), 'zh-CN');
                }

                if (sortKey === 'date') {
                    var leftDate = String(left.date || left.last_updated || '');
                    var rightDate = String(right.date || right.last_updated || '');
                    if (leftDate !== rightDate) return leftDate < rightDate ? 1 : -1;
                }

                var delta = toOrder(left.order) - toOrder(right.order);
                if (delta !== 0) return delta;
                return String(left.title || '').localeCompare(String(right.title || ''), 'zh-CN');
            }

            function toRelativeGroupPath(docFolder, currentPath) {
                var folder = normalizePath(docFolder);
                var current = normalizePath(currentPath);
                if (!current) return folder;
                if (folder === current) return '';
                if (folder.indexOf(current + '/') === 0) {
                    return folder.slice(current.length + 1);
                }
                return folder;
            }

            function formatGroupLabel(relativePath, currentPath) {
                var safePath = normalizePath(relativePath);
                if (!safePath) return currentPath ? '当前目录' : '根目录';
                return safePath;
            }

            function createGroupedDocsNode(name, pathValue, depth) {
                return {
                    name: String(name || ''),
                    path: normalizePath(pathValue),
                    depth: Number(depth || 0),
                    docs: [],
                    children: new Map()
                };
            }

            function buildGroupedDocsTree(docs, currentPath) {
                var root = createGroupedDocsNode('', '', 0);
                docs.forEach(function (doc) {
                    var relativePath = toRelativeGroupPath(doc.folder, currentPath);
                    var parts = splitPath(relativePath);
                    var cursor = root;
                    var accum = '';
                    parts.forEach(function (part, index) {
                        accum = accum ? accum + '/' + part : part;
                        if (!cursor.children.has(part)) {
                            cursor.children.set(part, createGroupedDocsNode(part, accum, index + 1));
                        }
                        cursor = cursor.children.get(part);
                    });
                    cursor.docs.push(doc);
                });
                return root;
            }

            function listGroupedChildNodes(node) {
                return Array.from(node.children.values()).sort(function (left, right) {
                    return compareTreeName(left.name, right.name);
                });
            }

            function countGroupedDocs(node) {
                if (!node) return 0;
                var count = node.docs.length;
                listGroupedChildNodes(node).forEach(function (child) {
                    count += countGroupedDocs(child);
                });
                return count;
            }

            function filterDocs(docs, query) {
                var keyword = String(query || '').trim().toLowerCase();
                if (!keyword) return docs;

                return docs.filter(function (doc) {
                    var blob = [
                        doc.title,
                        doc.description,
                        doc.author,
                        doc.category,
                        doc.topic,
                        doc.path,
                        doc.tags.join(' ')
                    ].join(' ').toLowerCase();
                    return blob.includes(keyword);
                });
            }

            function getArticleScrollContainer() {
                return refs.list || refs.articlePanel || null;
            }

            function buildArticleProgressKey() {
                var pathValue = normalizePath(state.currentPath || '');
                var queryValue = String(state.query || '').trim();
                var sortValue = ALLOWED_SORTS.has(state.sort) ? state.sort : DEFAULT_SORT;
                return [pathValue, queryValue, sortValue].join('||');
            }

            function readArticleProgressStore() {
                try {
                    var raw = window.localStorage.getItem(ARTICLE_PROGRESS_STORAGE_KEY);
                    if (!raw) return {};
                    var parsed = JSON.parse(raw);
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (error) {
                    return {};
                }
            }

            function writeArticleProgressStore(store) {
                try {
                    window.localStorage.setItem(ARTICLE_PROGRESS_STORAGE_KEY, JSON.stringify(store));
                } catch (error) {
                    console.warn('无法保存文章浏览进度:', error);
                }
            }

            function saveArticlePanelProgress(progressKey) {
                var key = String(progressKey || '').trim();
                var container = getArticleScrollContainer();
                if (!key || !container) return;
                var top = Math.max(0, Math.round(container.scrollTop || 0));
                var store = readArticleProgressStore();
                store[key] = {
                    top: top,
                    updatedAt: Date.now()
                };

                var entries = Object.keys(store).map(function (entryKey) {
                    var item = store[entryKey];
                    return {
                        key: entryKey,
                        updatedAt: item && typeof item === 'object' ? Number(item.updatedAt || 0) : 0
                    };
                });
                if (entries.length > MAX_ARTICLE_PROGRESS_ENTRIES) {
                    entries.sort(function (left, right) { return left.updatedAt - right.updatedAt; });
                    entries.slice(0, entries.length - MAX_ARTICLE_PROGRESS_ENTRIES).forEach(function (entry) {
                        delete store[entry.key];
                    });
                }

                writeArticleProgressStore(store);
            }

            function restoreArticlePanelProgress(progressKey) {
                var key = String(progressKey || '').trim();
                var container = getArticleScrollContainer();
                if (!container) return;
                if (!key) {
                    container.scrollTop = 0;
                    return;
                }

                var store = readArticleProgressStore();
                var record = store[key];
                var top = 0;
                if (typeof record === 'number') {
                    top = Number(record);
                } else if (record && typeof record === 'object') {
                    top = Number(record.top || 0);
                }
                container.scrollTop = Number.isFinite(top) && top > 0 ? top : 0;
            }

            function readGroupCollapseStore() {
                try {
                    var raw = window.localStorage.getItem(GROUP_COLLAPSE_STORAGE_KEY);
                    if (!raw) return {};
                    var parsed = JSON.parse(raw);
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (error) {
                    return {};
                }
            }

            function writeGroupCollapseStore(store) {
                try {
                    window.localStorage.setItem(GROUP_COLLAPSE_STORAGE_KEY, JSON.stringify(store));
                } catch (error) {
                    console.warn('无法保存分组折叠状态:', error);
                }
            }

            function buildGroupCollapseKey(groupNode) {
                var contextKey = buildArticleProgressKey();
                var groupPath = normalizePath(groupNode && groupNode.path || '');
                var groupDepth = Math.max(0, Number(groupNode && groupNode.depth || 0));
                return [contextKey, groupPath || '__current__', String(groupDepth)].join('||');
            }

            function getGroupCollapsedStateOrNull(groupNode) {
                var key = buildGroupCollapseKey(groupNode);
                if (!key) return null;
                var store = readGroupCollapseStore();
                var record = store[key];
                if (typeof record === 'boolean') return record;
                if (!record || typeof record !== 'object') return null;
                if (typeof record.collapsed === 'boolean') return record.collapsed;
                return null;
            }

            function saveGroupCollapsedState(groupNode, collapsed) {
                var key = buildGroupCollapseKey(groupNode);
                if (!key) return;
                var store = readGroupCollapseStore();
                store[key] = {
                    collapsed: !!collapsed,
                    updatedAt: Date.now()
                };

                var entries = Object.keys(store).map(function (entryKey) {
                    var item = store[entryKey];
                    return {
                        key: entryKey,
                        updatedAt: item && typeof item === 'object' ? Number(item.updatedAt || 0) : 0
                    };
                });
                if (entries.length > MAX_GROUP_COLLAPSE_ENTRIES) {
                    entries.sort(function (left, right) { return left.updatedAt - right.updatedAt; });
                    entries.slice(0, entries.length - MAX_GROUP_COLLAPSE_ENTRIES).forEach(function (entry) {
                        delete store[entry.key];
                    });
                }

                writeGroupCollapseStore(store);
            }

            function setMetaContent(selector, content) {
                var el = document.querySelector(selector);
                if (el && content) el.setAttribute('content', content);
            }

            function setCanonicalHref(href) {
                var link = document.querySelector('link[rel="canonical"]');
                if (!link) {
                    link = document.createElement('link');
                    link.setAttribute('rel', 'canonical');
                    document.head.appendChild(link);
                }
                link.setAttribute('href', href);
            }

            function updateSeo(normalizedPath) {
                var url = new URL('https://dpapyru.github.io/site/pages/folder.html');
                if (normalizedPath) {
                    url.searchParams.set('path', normalizedPath);
                }
                url.searchParams.delete('q');
                url.searchParams.delete('sort');

                var displayPath = normalizedPath || ROOT_LABEL;
                var canonical = url.toString();
                var title = displayPath + ' - 文件夹内容 - 泰拉瑞亚Mod制作教程';
                var description = '目录「' + displayPath + '」下的文章索引，支持按元数据筛选与排序。';

                document.title = title;
                setMetaContent('meta[name="description"]', description);
                setMetaContent('meta[property="og:title"]', title);
                setMetaContent('meta[property="og:description"]', description);
                setMetaContent('meta[property="og:url"]', canonical);
                setMetaContent('meta[name="twitter:title"]', title);
                setMetaContent('meta[name="twitter:description"]', description);
                setCanonicalHref(canonical);
            }

            function getQueryState() {
                var url = new URL(window.location.href);
                var searchParams = url.searchParams;
                var parsedSort = String(searchParams.get('sort') || DEFAULT_SORT);
                return {
                    path: normalizePath(searchParams.get('path') || ''),
                    query: String(searchParams.get('q') || '').trim(),
                    sort: ALLOWED_SORTS.has(parsedSort) ? parsedSort : DEFAULT_SORT
                };
            }

            function applyStateToUrl(replaceState) {
                var url = new URL(window.location.href);
                if (state.currentPath) {
                    url.searchParams.set('path', state.currentPath);
                } else {
                    url.searchParams.delete('path');
                }

                if (state.query) {
                    url.searchParams.set('q', state.query);
                } else {
                    url.searchParams.delete('q');
                }

                if (state.sort && state.sort !== DEFAULT_SORT) {
                    url.searchParams.set('sort', state.sort);
                } else {
                    url.searchParams.delete('sort');
                }

                if (replaceState) {
                    window.history.replaceState({ path: state.currentPath, q: state.query, sort: state.sort }, '', url.toString());
                } else {
                    window.history.pushState({ path: state.currentPath, q: state.query, sort: state.sort }, '', url.toString());
                }
            }

            function compareTreeName(left, right) {
                try {
                    return String(left || '').localeCompare(String(right || ''), 'zh-Hans-CN', { numeric: true, sensitivity: 'base' });
                } catch (error) {
                    return String(left || '').localeCompare(String(right || ''), 'zh-CN');
                }
            }

            function createDocTreeNode(name, type) {
                return {
                    name: name,
                    type: type,
                    children: Object.create(null),
                    doc: null
                };
            }

            function buildDocPathTree(docs) {
                var root = createDocTreeNode('', 'root');
                (docs || []).forEach(function (doc) {
                    var docPath = normalizePath((doc && doc.path) || (doc && doc.filename) || '');
                    if (!docPath) return;
                    var parts = splitPath(docPath);
                    if (!parts.length) return;

                    var cursor = root;
                    for (var i = 0; i < parts.length; i += 1) {
                        var part = parts[i];
                        var isLeaf = i === parts.length - 1;
                        if (isLeaf) {
                            var fileNode = createDocTreeNode(part, 'file');
                            fileNode.doc = doc;
                            cursor.children[part] = fileNode;
                        } else {
                            if (!cursor.children[part]) cursor.children[part] = createDocTreeNode(part, 'folder');
                            cursor = cursor.children[part];
                        }
                    }
                });
                return root;
            }

            function getFolderCollapsedStateOrNull(folderKey) {
                try {
                    var key = String(folderKey || '').trim();
                    if (!key) return null;
                    var storageKey = 'docsViewerSidebarFolder' + key.charAt(0).toUpperCase() + key.slice(1);
                    var value = window.localStorage.getItem(storageKey);
                    if (value === null) return null;
                    return value === 'true';
                } catch (error) {
                    return null;
                }
            }

            function setFolderCollapsedState(folderKey, isCollapsed) {
                try {
                    var key = String(folderKey || '').trim();
                    if (!key) return;
                    var storageKey = 'docsViewerSidebarFolder' + key.charAt(0).toUpperCase() + key.slice(1);
                    window.localStorage.setItem(storageKey, isCollapsed ? 'true' : 'false');
                } catch (error) {
                    console.warn('无法保存目录折叠状态:', error);
                }
            }

            function setFolderCollapsedDom(folderLi, collapsed, persist) {
                folderLi.dataset.collapsed = collapsed ? '1' : '0';
                var toggleBtn = folderLi.querySelector(':scope > .learn-tree-row .learn-tree-toggle');
                if (toggleBtn) toggleBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');

                if (persist) {
                    var folderKey = folderLi.dataset.folderKey || '';
                    if (folderKey) setFolderCollapsedState(folderKey, collapsed);
                }
            }

            function appendTreeGuides(container, ancestorLast, isLast, depth) {
                if (!container || !depth) return;
                var ancestor = Array.isArray(ancestorLast) ? ancestorLast : [];
                var ancestorCols = Math.max(depth - 1, 0);

                for (var i = 0; i < ancestorCols; i += 1) {
                    var col = document.createElement('span');
                    col.className = 'learn-tree-guide' + (ancestor[i] ? '' : ' has-vertical');
                    container.appendChild(col);
                }

                var current = document.createElement('span');
                current.className = 'learn-tree-guide current has-vertical' + (isLast ? ' is-last' : '');
                container.appendChild(current);
            }

            function renderFolderTree() {
                if (!refs.tree) return;
                refs.tree.innerHTML = '';
                if (!state.tree) return;

                var docsTree = buildDocPathTree(state.allDocs);
                var activeAncestors = new Set();
                var activeParts = splitPath(state.currentPath);
                var accum = '';
                activeParts.forEach(function (part) {
                    accum = accum ? accum + '/' + part : part;
                    activeAncestors.add(accum);
                });

                var rootUl = document.createElement('ul');
                rootUl.className = 'learn-tree-root';

                function applyFolderSelection(pathValue) {
                    var nextPath = normalizePath(pathValue);
                    if (state.currentPath === nextPath) return;
                    state.currentPath = nextPath;
                    renderAll(false);
                }

                function renderTree(parentUl, treeNode, parentPath, depth, ancestorLast) {
                    var ancestor = Array.isArray(ancestorLast) ? ancestorLast : [];
                    var names = Object.keys(treeNode.children || {}).sort(compareTreeName);
                    var folderNames = names.filter(function (name) { return treeNode.children[name].type === 'folder'; });
                    var fileNames = names.filter(function (name) { return treeNode.children[name].type === 'file'; });

                    folderNames.forEach(function (folderName) {
                        var isLast = folderName === folderNames[folderNames.length - 1] && fileNames.length === 0;
                        var folderNode = treeNode.children[folderName];
                        var folderPath = parentPath ? parentPath + '/' + folderName : folderName;
                        var folderKey = encodeURIComponent(folderPath);

                        var li = document.createElement('li');
                        li.className = 'learn-tree-folder';
                        li.dataset.folderPath = folderPath;
                        li.dataset.folderKey = folderKey;
                        li.dataset.depth = String(depth);
                        if (state.currentPath === folderPath) li.classList.add('is-active');

                        var row = document.createElement('div');
                        row.className = 'learn-tree-row learn-tree-folder-row';
                        row.setAttribute('role', 'button');
                        row.setAttribute('tabindex', '0');
                        row.setAttribute('aria-label', '展开或收起目录 ' + folderName);

                        var label = document.createElement('span');
                        label.className = 'learn-tree-label';
                        label.textContent = folderName;

                        var guides = document.createElement('span');
                        guides.className = 'learn-tree-guides';
                        guides.setAttribute('aria-hidden', 'true');
                        appendTreeGuides(guides, ancestor, isLast, depth);

                        var toggle = document.createElement('button');
                        toggle.type = 'button';
                        toggle.className = 'learn-tree-toggle';
                        toggle.setAttribute('aria-label', '展开/收起');

                        var item = document.createElement('span');
                        item.className = 'learn-tree-item';
                        item.appendChild(toggle);
                        item.appendChild(label);

                        var openFolderBtn = document.createElement('button');
                        openFolderBtn.type = 'button';
                        openFolderBtn.className = 'learn-tree-open-folder';
                        openFolderBtn.setAttribute('aria-label', '查看目录 ' + folderName);
                        openFolderBtn.textContent = '查看';
                        item.appendChild(openFolderBtn);

                        row.appendChild(guides);
                        row.appendChild(item);
                        li.appendChild(row);

                        var childrenUl = document.createElement('ul');
                        childrenUl.className = 'learn-tree-children';
                        li.appendChild(childrenUl);

                        renderTree(childrenUl, folderNode, folderPath, depth + 1, ancestor.concat([isLast]));

                        var storedCollapsed = getFolderCollapsedStateOrNull(folderKey);
                        var collapsed = (storedCollapsed === null ? depth >= 1 : storedCollapsed) && !activeAncestors.has(folderPath);
                        setFolderCollapsedDom(li, collapsed, false);

                        function onToggle(event) {
                            if (event) event.stopPropagation();
                            var nowCollapsed = li.dataset.collapsed !== '1';
                            setFolderCollapsedDom(li, nowCollapsed, true);
                        }

                        row.addEventListener('click', onToggle);
                        row.addEventListener('keydown', function (event) {
                            if (event.key !== 'Enter' && event.key !== ' ') return;
                            event.preventDefault();
                            onToggle();
                        });
                        toggle.addEventListener('click', onToggle);
                        openFolderBtn.addEventListener('click', function (event) {
                            event.stopPropagation();
                            applyFolderSelection(folderPath);
                        });

                        parentUl.appendChild(li);
                    });

                    fileNames.forEach(function (fileName) {
                        var isLast = fileName === fileNames[fileNames.length - 1];
                        var fileNode = treeNode.children[fileName];
                        var doc = fileNode && fileNode.doc ? fileNode.doc : {};
                        var docPath = normalizePath(doc.path || doc.filename || '');
                        if (!docPath) return;

                        var li = document.createElement('li');
                        li.className = 'learn-tree-file';
                        li.dataset.depth = String(depth);

                        var link = document.createElement('a');
                        link.className = 'learn-tree-link';
                        link.href = '/site/pages/viewer.html?file=' + encodeURIComponent(docPath);

                        var guides = document.createElement('span');
                        guides.className = 'learn-tree-guides';
                        guides.setAttribute('aria-hidden', 'true');
                        appendTreeGuides(guides, ancestor, isLast, depth);

                        var label = document.createElement('span');
                        label.className = 'learn-tree-link-label';
                        label.textContent = doc.title || fileName.replace(/\.md$/i, '');

                        var spacer = document.createElement('span');
                        spacer.className = 'learn-tree-toggle-spacer';
                        spacer.setAttribute('aria-hidden', 'true');

                        var item = document.createElement('span');
                        item.className = 'learn-tree-item';
                        item.appendChild(spacer);
                        item.appendChild(label);

                        link.appendChild(guides);
                        link.appendChild(item);
                        li.appendChild(link);
                        parentUl.appendChild(li);
                    });
                }

                var rootLi = document.createElement('li');
                rootLi.className = 'learn-tree-folder' + (state.currentPath ? '' : ' is-active');
                rootLi.dataset.folderPath = '';
                rootLi.dataset.folderKey = encodeURIComponent('__root__');
                rootLi.dataset.depth = '0';

                var rootRow = document.createElement('div');
                rootRow.className = 'learn-tree-row learn-tree-folder-row';
                rootRow.setAttribute('role', 'button');
                rootRow.setAttribute('tabindex', '0');
                rootRow.setAttribute('aria-label', '展开或收起全部目录');

                var rootGuides = document.createElement('span');
                rootGuides.className = 'learn-tree-guides';
                rootGuides.setAttribute('aria-hidden', 'true');

                var rootToggle = document.createElement('button');
                rootToggle.type = 'button';
                rootToggle.className = 'learn-tree-toggle';
                rootToggle.setAttribute('aria-label', '展开/收起');

                var rootLabel = document.createElement('span');
                rootLabel.className = 'learn-tree-label';
                rootLabel.textContent = '全部目录';

                var rootItem = document.createElement('span');
                rootItem.className = 'learn-tree-item';
                rootItem.appendChild(rootToggle);
                rootItem.appendChild(rootLabel);

                var rootOpenBtn = document.createElement('button');
                rootOpenBtn.type = 'button';
                rootOpenBtn.className = 'learn-tree-open-folder';
                rootOpenBtn.setAttribute('aria-label', '查看全部目录');
                rootOpenBtn.textContent = '查看';
                rootItem.appendChild(rootOpenBtn);

                rootRow.appendChild(rootGuides);
                rootRow.appendChild(rootItem);
                rootLi.appendChild(rootRow);

                var rootChildren = document.createElement('ul');
                rootChildren.className = 'learn-tree-children';
                rootLi.appendChild(rootChildren);
                renderTree(rootChildren, docsTree, '', 0, []);

                var rootStoredCollapsed = getFolderCollapsedStateOrNull(rootLi.dataset.folderKey);
                setFolderCollapsedDom(rootLi, rootStoredCollapsed === null ? false : rootStoredCollapsed, false);

                function onRootToggle(event) {
                    if (event) event.stopPropagation();
                    var nowCollapsed = rootLi.dataset.collapsed !== '1';
                    setFolderCollapsedDom(rootLi, nowCollapsed, true);
                }

                rootRow.addEventListener('click', onRootToggle);
                rootRow.addEventListener('keydown', function (event) {
                    if (event.key !== 'Enter' && event.key !== ' ') return;
                    event.preventDefault();
                    onRootToggle();
                });
                rootToggle.addEventListener('click', onRootToggle);
                rootOpenBtn.addEventListener('click', function (event) {
                    event.stopPropagation();
                    applyFolderSelection('');
                });

                rootUl.appendChild(rootLi);
                refs.tree.appendChild(rootUl);
            }

            function createMetaPill(label, value, className) {
                if (!value) return null;
                var pill = document.createElement('span');
                pill.className = 'folder-meta-pill' + (className ? ' ' + className : '');
                pill.textContent = label + '：' + value;
                return pill;
            }

            function createDocCard(doc) {
                var card = document.createElement('article');
                card.className = 'folder-doc-card';

                var main = document.createElement('div');
                main.className = 'folder-doc-main';

                var stack = document.createElement('div');
                stack.className = 'folder-doc-meta-stack';

                var titleLink = document.createElement('a');
                titleLink.className = 'folder-doc-title-link';
                titleLink.href = '/site/pages/viewer.html?file=' + encodeURIComponent(doc.path);
                titleLink.textContent = doc.title;
                stack.appendChild(titleLink);

                var desc = document.createElement('p');
                desc.className = 'folder-doc-desc';
                desc.textContent = doc.description;
                stack.appendChild(desc);

                var metaRow = document.createElement('div');
                metaRow.className = 'folder-meta-row';
                var authorPill = createMetaPill('作者', doc.author);
                var timePill = createMetaPill('时长', doc.time || doc.reading_time);
                var difficultyPill = createMetaPill('难度', doc.difficulty, 'folder-meta-pill--difficulty');
                var datePill = createMetaPill('更新', doc.last_updated || doc.date);
                [authorPill, timePill, difficultyPill, datePill].forEach(function (pill) {
                    if (pill) metaRow.appendChild(pill);
                });
                stack.appendChild(metaRow);

                if (doc.tags && doc.tags.length) {
                    var tagsRow = document.createElement('div');
                    tagsRow.className = 'folder-meta-row';
                    doc.tags.slice(0, 6).forEach(function (tag) {
                        var tagPill = createMetaPill('标签', tag);
                        if (tagPill) tagsRow.appendChild(tagPill);
                    });
                    stack.appendChild(tagsRow);
                }

                if (Array.isArray(doc.prefix) && doc.prefix.length) {
                    var prefixRow = document.createElement('div');
                    prefixRow.className = 'folder-prefix-row';
                    var prefixLabel = document.createElement('span');
                    prefixLabel.className = 'folder-prefix-label';
                    prefixLabel.textContent = '前置：';
                    prefixRow.appendChild(prefixLabel);
                    doc.prefix.slice(0, 3).forEach(function (prefixItem, index) {
                        var prefixLink = document.createElement('a');
                        prefixLink.className = 'folder-prefix-link';
                        prefixLink.href = '/site/pages/viewer.html?file=' + encodeURIComponent(prefixItem.path);
                        prefixLink.textContent = prefixItem.label;
                        prefixRow.appendChild(prefixLink);
                        if (index < Math.min(doc.prefix.length, 3) - 1) {
                            prefixRow.appendChild(document.createTextNode(' / '));
                        }
                    });
                    if (doc.prefix.length > 3) {
                        prefixRow.appendChild(document.createTextNode(' +' + (doc.prefix.length - 3)));
                    }
                    stack.appendChild(prefixRow);
                }

                main.appendChild(stack);

                var actions = document.createElement('div');
                actions.className = 'folder-doc-actions';
                var docLink = document.createElement('a');
                docLink.className = 'folder-doc-link';
                docLink.href = '/site/pages/viewer.html?file=' + encodeURIComponent(doc.path);
                docLink.textContent = '阅读文章';
                actions.appendChild(docLink);
                main.appendChild(actions);

                card.appendChild(main);
                return card;
            }

            function renderGroupSection(groupNode, currentPath) {
                var section = document.createElement('section');
                section.className = 'folder-group';
                section.dataset.depth = String(Math.max(0, Number(groupNode && groupNode.depth || 0)));
                section.dataset.groupKey = buildGroupCollapseKey(groupNode);

                var header = document.createElement('div');
                header.className = 'folder-group-header';
                header.setAttribute('role', 'button');
                header.setAttribute('tabindex', '0');
                var groupTitle = document.createElement('span');
                groupTitle.className = 'folder-group-title';
                var groupTitleText = groupNode.path ? groupNode.name : formatGroupLabel('', currentPath);
                groupTitle.textContent = groupTitleText;

                var titleWrap = document.createElement('span');
                titleWrap.className = 'folder-group-title-wrap';

                var groupToggle = document.createElement('button');
                groupToggle.type = 'button';
                groupToggle.className = 'folder-group-toggle';
                groupToggle.setAttribute('aria-label', '展开或收起分组');
                titleWrap.appendChild(groupToggle);
                titleWrap.appendChild(groupTitle);
                header.appendChild(titleWrap);

                var groupCount = document.createElement('span');
                groupCount.className = 'folder-group-count';
                groupCount.textContent = countGroupedDocs(groupNode) + ' 篇';
                header.appendChild(groupCount);
                header.setAttribute('aria-label', '展开或收起分组 ' + groupTitleText);
                section.appendChild(header);

                var body = document.createElement('div');
                body.className = 'folder-group-body';
                groupBodyIdSeed += 1;
                body.id = 'folder-group-body-' + groupBodyIdSeed;
                header.setAttribute('aria-controls', body.id);
                groupToggle.setAttribute('aria-controls', body.id);

                if (Array.isArray(groupNode.docs) && groupNode.docs.length) {
                    var groupList = document.createElement('div');
                    groupList.className = 'folder-group-list';
                    groupNode.docs.forEach(function (doc) {
                        groupList.appendChild(createDocCard(doc));
                    });
                    body.appendChild(groupList);
                }

                var childGroups = listGroupedChildNodes(groupNode);
                if (childGroups.length) {
                    var childrenWrap = document.createElement('div');
                    childrenWrap.className = 'folder-group-children';
                    childGroups.forEach(function (childNode) {
                        childrenWrap.appendChild(renderGroupSection(childNode, currentPath));
                    });
                    body.appendChild(childrenWrap);
                }

                function setGroupCollapsedDom(collapsed, persist) {
                    section.dataset.collapsed = collapsed ? '1' : '0';
                    header.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                    groupToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                    if (persist) {
                        saveGroupCollapsedState(groupNode, collapsed);
                    }
                }

                function onGroupToggle(event) {
                    if (event) event.stopPropagation();
                    var nowCollapsed = section.dataset.collapsed !== '1';
                    setGroupCollapsedDom(nowCollapsed, true);
                }

                header.addEventListener('click', onGroupToggle);
                header.addEventListener('keydown', function (event) {
                    if (event.key !== 'Enter' && event.key !== ' ') return;
                    event.preventDefault();
                    onGroupToggle();
                });
                groupToggle.addEventListener('click', function (event) {
                    event.stopPropagation();
                    onGroupToggle();
                });

                var storedCollapsed = getGroupCollapsedStateOrNull(groupNode);
                var isNestedGroup = Number(groupNode && groupNode.depth || 0) >= 1;
                var initialCollapsed = storedCollapsed === null ? isNestedGroup : storedCollapsed;
                setGroupCollapsedDom(initialCollapsed, false);

                section.appendChild(body);
                return section;
            }

            function renderArticleList() {
                if (!refs.list || !refs.empty) return;

                var folderNode = getFolderNode(state.currentPath) || state.tree;
                var rawDocs = collectDocsRecursively(folderNode);
                var docs = filterDocs(rawDocs, state.query);
                docs.sort(function (left, right) {
                    return compareDocs(left, right, state.sort);
                });
                var groupedDocsTree = buildGroupedDocsTree(docs, state.currentPath);

                refs.list.innerHTML = '';
                groupBodyIdSeed = 0;
                refs.path.textContent = state.currentPath || '全部目录';
                refs.total.textContent = String(docs.length);
                if (refs.subfolderCount) {
                    refs.subfolderCount.textContent = String(folderNode && folderNode.children ? folderNode.children.size : 0);
                }
                if (refs.rawCount) {
                    refs.rawCount.textContent = String(rawDocs.length);
                }

                if (!docs.length) {
                    refs.empty.hidden = false;
                    return;
                }

                refs.empty.hidden = true;

                if (groupedDocsTree.docs.length) {
                    refs.list.appendChild(renderGroupSection(groupedDocsTree, state.currentPath));
                    return;
                }

                listGroupedChildNodes(groupedDocsTree).forEach(function (groupNode) {
                    refs.list.appendChild(renderGroupSection(groupNode, state.currentPath));
                });
            }

            function renderAll(replaceState) {
                if (!state.tree) return;
                if (state.currentArticleProgressKey) {
                    saveArticlePanelProgress(state.currentArticleProgressKey);
                }
                renderFolderTree();
                renderArticleList();
                state.currentArticleProgressKey = buildArticleProgressKey();
                restoreArticlePanelProgress(state.currentArticleProgressKey);
                updateSeo(state.currentPath);
                applyStateToUrl(!!replaceState);
            }

            function applyQueryState(replaceState) {
                var queryState = getQueryState();
                var node = getFolderNode(queryState.path);
                state.currentPath = node ? queryState.path : '';
                state.query = queryState.query;
                state.sort = queryState.sort;

                refs.search.value = state.query;
                refs.sort.value = state.sort;
                renderAll(replaceState);
            }

            function loadConfig() {
                if (window.SiteConfig && typeof window.SiteConfig.load === 'function') {
                    return window.SiteConfig.load();
                }

                return fetch('/site/content/config.json', { cache: 'no-store' }).then(function (response) {
                    if (!response.ok) throw new Error('无法加载配置文件: ' + response.status);
                    return response.json();
                });
            }

            function bindEvents() {
                var articleProgressTimer = 0;

                refs.search.addEventListener('input', function () {
                    state.query = String(refs.search.value || '').trim();
                    renderAll(true);
                });

                refs.sort.addEventListener('change', function () {
                    var value = String(refs.sort.value || DEFAULT_SORT);
                    state.sort = ALLOWED_SORTS.has(value) ? value : DEFAULT_SORT;
                    renderAll(true);
                });

                window.addEventListener('popstate', function () {
                    applyQueryState(true);
                });

                if (refs.list) {
                    refs.list.addEventListener('scroll', function () {
                        if (articleProgressTimer) return;
                        articleProgressTimer = window.setTimeout(function () {
                            articleProgressTimer = 0;
                            saveArticlePanelProgress(state.currentArticleProgressKey || buildArticleProgressKey());
                        }, 120);
                    });
                }

                window.addEventListener('beforeunload', function () {
                    if (articleProgressTimer) {
                        window.clearTimeout(articleProgressTimer);
                        articleProgressTimer = 0;
                    }
                    saveArticlePanelProgress(state.currentArticleProgressKey || buildArticleProgressKey());
                });
            }

            function cacheRefs() {
                refs.tree = document.getElementById('folder-folder-tree');
                refs.articlePanel = document.getElementById('folder-article-panel');
                refs.list = document.getElementById('folder-article-list');
                refs.empty = document.getElementById('folder-empty');
                refs.search = document.getElementById('folder-search-input');
                refs.sort = document.getElementById('folder-sort-select');
                refs.path = document.getElementById('folder-current-path');
                refs.total = document.getElementById('folder-total-count');
                refs.subfolderCount = document.getElementById('folder-subfolder-count');
                refs.rawCount = document.getElementById('folder-raw-count');
            }

            document.addEventListener('DOMContentLoaded', function () {
                cacheRefs();
                loadConfig().then(function (config) {
                    var docs = Array.isArray(config && config.all_files) ? config.all_files : [];
                    state.allDocs = docs.map(normalizeDoc).filter(Boolean);
                    state.tree = buildFolderIndex(state.allDocs);
                    bindEvents();
                    applyQueryState(true);
                }).catch(function (error) {
                    console.error('folder.html 初始化失败:', error);
                    if (refs.empty) {
                        refs.empty.hidden = false;
                        refs.empty.textContent = '加载目录数据失败，请稍后重试。';
                    }
                });
            });
        })();
    </script>
</body>
</html>
